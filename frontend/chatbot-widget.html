<!-- Chatbot Widget - Add this to index.html before closing body tag -->
<div id="chatbot-widget">
  <div id="chatbot-button" onclick="toggleChatbot()">
    <span>🤖</span>
  </div>
  <div id="chatbot-window">
    <div class="chatbot-header">
      <div class="chatbot-title">🤖 Shopping Assistant</div>
      <button class="chatbot-close" onclick="toggleChatbot()">✕</button>
    </div>
    <div id="chatbot-messages" class="chatbot-messages"></div>
    <div class="chatbot-input-area">
      <input type="text" id="chatbot-input" placeholder="Ask about products..." onkeypress="if(event.key==='Enter')sendChatMessage()">
      <button onclick="sendChatMessage()">Send</button>
    </div>
  </div>
</div>

<style>
#chatbot-widget{position:fixed;bottom:20px;right:20px;z-index:9999;font-family:'Poppins',sans-serif}
#chatbot-button{width:60px;height:60px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,.4);transition:all .3s;font-size:28px}
#chatbot-button:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(124,58,237,.6)}
#chatbot-window{position:absolute;bottom:80px;right:0;width:380px;height:500px;background:#fff;border-radius:20px;box-shadow:0 10px 60px rgba(0,0,0,.3);display:none;flex-direction:column;overflow:hidden}
#chatbot-window.active{display:flex}
.chatbot-header{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.chatbot-title{font-size:16px;font-weight:700}
.chatbot-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.8;transition:opacity .2s}
.chatbot-close:hover{opacity:1}
.chatbot-messages{flex:1;overflow-y:auto;padding:16px;background:#f8f7ff}
.chatbot-message{margin-bottom:12px;display:flex;flex-direction:column}
.chatbot-message.user{align-items:flex-end}
.chatbot-message.bot{align-items:flex-start}
.chatbot-bubble{max-width:80%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.4}
.chatbot-message.user .chatbot-bubble{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border-bottom-right-radius:4px}
.chatbot-message.bot .chatbot-bubble{background:#fff;border:1px solid #e5e7eb;color:#1f2937;border-bottom-left-radius:4px}
.chatbot-product-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:8px;cursor:pointer;transition:all .2s}
.chatbot-product-card:hover{border-color:#7c3aed;transform:translateX(-4px)}
.chatbot-product-img{width:60px;height:60px;object-fit:cover;border-radius:8px;float:left;margin-right:12px}
.chatbot-product-info{overflow:hidden}
.chatbot-product-name{font-weight:600;font-size:13px;color:#1f2937;margin-bottom:4px}
.chatbot-product-price{font-size:14px;font-weight:700;color:#7c3aed}
.chatbot-product-price .original{font-size:12px;color:#9ca3af;text-decoration:line-through;font-weight:400;margin-left:6px}
.chatbot-input-area{padding:16px;background:#fff;border-top:1px solid #e5e7eb;display:flex;gap:8px}
.chatbot-input-area input{flex:1;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;outline:none;transition:border-color .2s;font-family:'Poppins',sans-serif}
.chatbot-input-area input:focus{border-color:#7c3aed}
.chatbot-input-area button{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.chatbot-input-area button:hover{background:linear-gradient(135deg,#6d28d9,#5b21b6)}
.typing-indicator{display:flex;gap:4px;padding:8px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:16px;width:fit-content;margin-bottom:12px}
.typing-indicator span{width:8px;height:8px;background:#9ca3af;border-radius:50%;animation:typing 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@media(max-width:480px){#chatbot-window{width:320px;right:-10px;bottom:70px}}
</style>

<script>
let chatbotOpen=false;
function toggleChatbot(){
  chatbotOpen=!chatbotOpen;
  document.getElementById('chatbot-window').classList.toggle('active',chatbotOpen);
  if(chatbotOpen&&document.getElementById('chatbot-messages').children.length===0){
    addBotMessage("Hi! 👋 I'm your shopping assistant. Ask me about products, categories, or price ranges!");
  }
}

async function sendChatMessage(){
  const input=document.getElementById('chatbot-input');
  const message=input.value.trim();
  if(!message)return;
  
  addUserMessage(message);
  input.value='';
  
  showTyping();
  
  try{
    const r=await fetch('/api/chatbot/query',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message})
    });
    const d=await r.json();
    hideTyping();
    addBotMessage(d.response);
    if(d.products&&d.products.length>0){
      d.products.forEach(p=>addProductCard(p));
    }
  }catch(err){
    hideTyping();
    addBotMessage("Sorry, I couldn't process your request. Please try again.");
  }
}

function addUserMessage(text){
  const div=document.createElement('div');
  div.className='chatbot-message user';
  div.innerHTML=`<div class="chatbot-bubble">${text}</div>`;
  document.getElementById('chatbot-messages').appendChild(div);
  scrollToBottom();
}

function addBotMessage(text){
  const div=document.createElement('div');
  div.className='chatbot-message bot';
  div.innerHTML=`<div class="chatbot-bubble">${text}</div>`;
  document.getElementById('chatbot-messages').appendChild(div);
  scrollToBottom();
}

function addProductCard(product){
  const div=document.createElement('div');
  div.className='chatbot-product-card';
  div.onclick=()=>location.href='/product.html?id='+product.id;
  div.innerHTML=`
    <img src="${product.image||'/image/default.jpg'}" class="chatbot-product-img" onerror="this.src='/image/default.jpg'">
    <div class="chatbot-product-info">
      <div class="chatbot-product-name">${product.name}</div>
      <div class="chatbot-product-price">
        ₹${product.price.toLocaleString('en-IN')}
        ${product.originalPrice>0?`<span class="original">₹${product.originalPrice.toLocaleString('en-IN')}</span>`:''}
      </div>
    </div>
  `;
  document.getElementById('chatbot-messages').appendChild(div);
  scrollToBottom();
}

function showTyping(){
  const div=document.createElement('div');
  div.id='typing-indicator';
  div.className='typing-indicator';
  div.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('chatbot-messages').appendChild(div);
  scrollToBottom();
}

function hideTyping(){
  const typing=document.getElementById('typing-indicator');
  if(typing)typing.remove();
}

function scrollToBottom(){
  const messages=document.getElementById('chatbot-messages');
  messages.scrollTop=messages.scrollHeight;
}
</script>
