<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Orders – ShopEasy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#7c3aed;--a:#f59e0b;--g:#10b981;--r:#ef4444;--bg:#f5f3ff;--txt:#1e1b4b;--muted:#6b7280;--border:#e5e7eb}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--txt)}
nav{background:linear-gradient(135deg,#3b0764,#6d28d9);height:68px;display:flex;align-items:center;padding:0 4%;gap:16px;position:sticky;top:0;z-index:99;box-shadow:0 4px 24px rgba(109,40,217,.45)}
.logo{font-size:22px;font-weight:900;color:#fff;text-decoration:none}.logo span{color:#fbbf24}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-r a{color:rgba(255,255,255,.9);text-decoration:none;font-size:13px;font-weight:600;padding:8px 12px;border-radius:10px;transition:all .2s}
.nav-r a:hover{background:rgba(255,255,255,.15)}
.nav-cart{background:linear-gradient(135deg,#f59e0b,#d97706)!important;color:#fff!important;font-weight:700!important;padding:9px 18px!important;border-radius:24px!important;display:flex!important;align-items:center!important;gap:8px!important}
.badge{background:#ef4444;color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
.upill{background:rgba(255,255,255,.18);color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600}
.wrap{max-width:860px;margin:40px auto;padding:0 20px}
.ptitle{font-size:28px;font-weight:800;margin-bottom:28px}

/* ORDER CARD */
.order-card{background:#fff;border-radius:20px;border:1.5px solid var(--border);padding:24px;margin-bottom:20px;box-shadow:0 4px 20px rgba(124,58,237,.07);transition:box-shadow .2s;animation:cin .5s ease both}
@keyframes cin{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.order-card:hover{box-shadow:0 10px 36px rgba(124,58,237,.14)}
.order-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.oid{font-size:15px;font-weight:800;color:var(--txt)}.odate{font-size:12px;color:var(--muted);margin-top:2px}
.status-chip{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.s-confirmed{background:#ede9fe;color:#6d28d9}.s-processing{background:#dbeafe;color:#2563eb}.s-shipped{background:#fef3c7;color:#d97706}.s-out_for_delivery{background:#d1fae5;color:#059669}.s-delivered{background:#d1fae5;color:#15803d}

/* TRACKING STEPS */
.track-wrap{margin:20px 0;position:relative}
.track-line{position:absolute;top:20px;left:20px;right:20px;height:3px;background:var(--border);border-radius:2px;z-index:0}
.track-line-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#7c3aed,#10b981);border-radius:2px;transition:width .8s ease}
.track-steps{display:flex;justify-content:space-between;position:relative;z-index:1}
.tstep{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.tstep-dot{width:40px;height:40px;border-radius:50%;background:#fff;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .4s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tstep.done .tstep-dot{background:linear-gradient(135deg,#7c3aed,#6d28d9);border-color:var(--p);box-shadow:0 4px 14px rgba(124,58,237,.35)}
.tstep.current .tstep-dot{background:linear-gradient(135deg,#f59e0b,#d97706);border-color:var(--a);box-shadow:0 4px 14px rgba(245,158,11,.4);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 14px rgba(245,158,11,.4)}50%{box-shadow:0 4px 22px rgba(245,158,11,.7)}}
.tstep-label{font-size:11px;font-weight:700;color:var(--muted);text-align:center;line-height:1.3}
.tstep.done .tstep-label,.tstep.current .tstep-label{color:var(--txt)}

/* STATUS HISTORY */
.history{margin-top:16px;border-top:1px dashed var(--border);padding-top:14px}
.history-item{display:flex;align-items:flex-start;gap:12px;padding:8px 0;font-size:13px}
.h-dot{width:10px;height:10px;border-radius:50%;background:var(--p);flex-shrink:0;margin-top:3px}
.h-dot.old{background:var(--muted)}
.h-info{flex:1}.h-msg{font-weight:600;color:var(--txt)}.h-time{color:var(--muted);font-size:11px;margin-top:2px}

/* ORDER ITEMS */
.order-items{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.oi-row{display:flex;align-items:center;gap:12px;padding:6px 0}
.oi-img{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#ede9fe,#ddd6fe);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
.oi-img img{width:100%;height:100%;object-fit:cover}
.oi-name{font-size:13px;font-weight:700;flex:1}.oi-qty{font-size:12px;color:var(--muted)}.oi-price{font-size:14px;font-weight:800;color:var(--p)}

.order-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:14px;margin-top:14px;flex-wrap:wrap;gap:10px}
.oaddr{font-size:12px;color:var(--muted);display:flex;align-items:flex-start;gap:6px;flex:1}
.ototal{font-size:19px;font-weight:900;color:var(--p)}
.advance-btn{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:8px 18px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .2s}
.advance-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,.4)}

/* EMPTY / LOADER */
.empty{text-align:center;padding:80px 20px;background:#fff;border-radius:22px;border:1.5px solid var(--border)}
.eico{font-size:72px;display:block;animation:flt 3s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.sbtn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;text-decoration:none;padding:14px 32px;border-radius:30px;font-weight:700;font-size:15px;box-shadow:0 6px 20px rgba(124,58,237,.35)}
.dots{display:flex;gap:10px;justify-content:center;padding:80px}
.dot{width:14px;height:14px;border-radius:50%;animation:db .7s alternate infinite}
.dot:nth-child(1){background:#7c3aed}.dot:nth-child(2){background:#f59e0b;animation-delay:.2s}.dot:nth-child(3){background:#10b981;animation-delay:.4s}
@keyframes db{from{transform:translateY(0);opacity:1}to{transform:translateY(-18px);opacity:.3}}
.toast{position:fixed;bottom:28px;right:28px;background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;padding:14px 20px;border-radius:18px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(124,58,237,.45);animation:tin .4s cubic-bezier(.34,1.56,.64,1);border-left:4px solid #fbbf24}
@keyframes tin{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">🛍️ Shop<span>Easy</span></a>
  <div class="nav-r">
    <div id="nav-user"></div>
    <a href="/cart.html" class="nav-cart">🛒 <span class="badge" id="cart-count">0</span></a>
  </div>
</nav>
<div class="wrap">
  <div class="ptitle">📦 My Orders</div>
  <div id="root"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
</div>
<script>
const EMOJIS={Electronics:'📱',Footwear:'👟',Clothing:'👕',default:'📦'};
const STEPS=['confirmed','processing','shipped','out_for_delivery','delivered'];
const STEP_LABELS={confirmed:'✅ Confirmed',processing:'⚙️ Processing',shipped:'📦 Shipped',out_for_delivery:'🚚 Out for Delivery',delivered:'🏠 Delivered'};
const STEP_ICONS={confirmed:'✅',processing:'⚙️',shipped:'📦',out_for_delivery:'🚚',delivered:'🏠'};

function updateBadge(){const el=document.getElementById('cart-count');if(el)el.textContent=JSON.parse(localStorage.getItem('cart')||'[]').reduce((s,i)=>s+i.qty,0)}
function logout(){localStorage.removeItem('token');localStorage.removeItem('userName');location.href='/'}
function renderNav(){
  const el=document.getElementById('nav-user');if(!el)return;
  const name=localStorage.getItem('userName');
  el.innerHTML=name?`<span class="upill">👤 ${name}</span><a href="#" onclick="logout()">Logout</a>`:`<a href="/login.html">Login</a>`;
}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400)},2800)}

function trackHTML(status, history){
  const cur=STEPS.indexOf(status);
  const pct=Math.round((cur/(STEPS.length-1))*100);
  return`<div class="track-wrap">
    <div class="track-line"><div class="track-line-fill" style="width:${pct}%"></div></div>
    <div class="track-steps">
      ${STEPS.map((s,i)=>`
        <div class="tstep ${i<cur?'done':i===cur?'current':''}">
          <div class="tstep-dot">${i<=cur?STEP_ICONS[s]:'○'}</div>
          <div class="tstep-label">${STEP_LABELS[s].replace(/.*\s/,'')}</div>
        </div>`).join('')}
    </div>
  </div>
  ${history&&history.length?`<div class="history">
    ${[...history].reverse().map((h,i)=>`
      <div class="history-item">
        <div class="h-dot ${i>0?'old':''}"></div>
        <div class="h-info"><div class="h-msg">${h.msg}</div><div class="h-time">${new Date(h.time).toLocaleString('en-IN')}</div></div>
      </div>`).join('')}
  </div>`:''}`;
}

async function advance(id){
  try{
    const r=await fetch('/api/orders/'+id+'/advance',{method:'POST',headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
    if(r.ok){toast('✅ Order status updated!');await load()}
    else toast('❌ Cannot advance further');
  }catch{toast('❌ Server error')}
}

async function load(){
  if(!localStorage.getItem('token')){location.href='/login.html';return}
  try{
    const r=await fetch('/api/orders/mine',{headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
    const orders=await r.json();
    const root=document.getElementById('root');
    if(!orders.length){
      root.innerHTML=`<div class="empty"><span class="eico">📭</span><h3 style="font-size:22px;font-weight:700;margin:16px 0 8px">No orders yet!</h3><p style="color:var(--muted);margin-bottom:24px">Browse products and place your first order!</p><a href="/" class="sbtn">🛍️ Shop Now</a></div>`;
      return;
    }
    root.innerHTML=orders.map((o,idx)=>`
      <div class="order-card" style="animation-delay:${idx*.08}s">
        <div class="order-head">
          <div>
            <div class="oid">Order #${o._id.slice(-10).toUpperCase()}</div>
            <div class="odate">${new Date(o.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="status-chip s-${o.status}">${STEP_ICONS[o.status]} ${o.status.replace('_',' ')}</span>
            ${o.status!=='delivered'?`<button class="advance-btn" onclick="advance('${o._id}')">▶ Simulate Next</button>`:''}
          </div>
        </div>

        ${trackHTML(o.status, o.statusHistory)}

        <div class="order-items">
          ${o.items.map(i=>`
            <div class="oi-row">
              <div class="oi-img">${i.image?`<img src="${i.image}" onerror="this.style.display='none'">`:''}${EMOJIS.default}</div>
              <div class="oi-name">${i.name}<div class="oi-qty">Qty: ${i.qty}</div></div>
              <div class="oi-price">₹${(i.price*i.qty).toLocaleString('en-IN')}</div>
            </div>`).join('')}
        </div>

        <div class="order-foot">
          <div class="oaddr">📍 ${o.address||'—'}<br>📱 ${o.phone||'—'}</div>
          <div class="ototal">₹${o.total.toLocaleString('en-IN')}</div>
        </div>
      </div>`).join('');
  }catch(e){document.getElementById('root').innerHTML='<p style="color:red;text-align:center;padding:40px">Error loading orders</p>'}
}
renderNav();updateBadge();load();
</script>
</body>
</html>
