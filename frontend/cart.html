<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cart – ShopEasy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#7c3aed;--a:#f59e0b;--g:#10b981;--r:#ef4444;--bg:#f5f3ff;--txt:#1e1b4b;--muted:#6b7280;--border:#e5e7eb}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--txt)}
nav{background:linear-gradient(135deg,#3b0764,#6d28d9);height:68px;display:flex;align-items:center;padding:0 4%;position:sticky;top:0;z-index:99;box-shadow:0 4px 24px rgba(109,40,217,.45);gap:16px}
.logo{font-size:22px;font-weight:900;color:#fff;text-decoration:none;flex-shrink:0}.logo span{color:#fbbf24}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-r a{color:rgba(255,255,255,.9);text-decoration:none;font-size:13px;font-weight:600;padding:8px 12px;border-radius:10px;transition:all .2s}
.nav-r a:hover{background:rgba(255,255,255,.15)}
.nav-cart{background:linear-gradient(135deg,#f59e0b,#d97706)!important;color:#fff!important;font-weight:700!important;padding:9px 18px!important;border-radius:24px!important;display:flex!important;align-items:center!important;gap:8px!important}
.badge{background:#ef4444;color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
.upill{background:rgba(255,255,255,.18);color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600}
.wrap{max-width:1100px;margin:40px auto;padding:0 20px}
.ptitle{font-size:28px;font-weight:800;margin-bottom:28px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
@media(max-width:760px){.layout{grid-template-columns:1fr}}
.cart-item{background:#fff;border-radius:18px;border:1.5px solid var(--border);padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;transition:box-shadow .2s}
.cart-item:hover{box-shadow:0 6px 24px rgba(124,58,237,.1)}
.item-img{width:72px;height:72px;border-radius:14px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#ede9fe,#ddd6fe);display:flex;align-items:center;justify-content:center;font-size:32px}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1}
.item-name{font-size:15px;font-weight:700;margin-bottom:4px}
.item-sub{font-size:12px;color:var(--muted);margin-bottom:6px}
.item-price{color:var(--p);font-weight:800;font-size:16px}
.item-controls{display:flex;align-items:center;gap:10px}
.qctrl{display:flex;align-items:center;gap:8px;background:#f5f3ff;border-radius:12px;padding:6px 12px}
.qb{background:none;border:none;font-size:18px;cursor:pointer;color:var(--p);font-weight:800;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .2s}
.qb:hover{background:var(--p);color:#fff}
.qn{font-size:15px;font-weight:800;min-width:20px;text-align:center}
.rm{background:none;border:none;font-size:20px;cursor:pointer;color:#ddd;transition:color .2s;padding:4px}
.rm:hover{color:var(--r)}
.summary{background:#fff;border-radius:22px;border:1.5px solid var(--border);padding:28px;position:sticky;top:80px;box-shadow:0 4px 24px rgba(124,58,237,.08)}
.sum-t{font-size:18px;font-weight:800;margin-bottom:20px}
.srow{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:12px}
.free{color:var(--g);font-weight:700}
.sdiv{border:none;border-top:2px dashed var(--border);margin:16px 0}
.stotal{display:flex;justify-content:space-between;font-size:20px;font-weight:900;color:var(--txt)}
.stotal span:last-child{color:var(--p)}
.cbtn{width:100%;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px;font-family:'Poppins',sans-serif;box-shadow:0 6px 20px rgba(124,58,237,.35);transition:all .25s}
.cbtn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(124,58,237,.5)}
.clrbtn{width:100%;background:#fff;color:var(--muted);border:1.5px solid var(--border);padding:12px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;font-family:'Poppins',sans-serif;transition:all .2s}
.clrbtn:hover{border-color:var(--r);color:var(--r)}
.trust{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.tb{font-size:11px;color:var(--muted);background:#faf9ff;padding:5px 10px;border-radius:8px;display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:80px 20px;background:#fff;border-radius:22px;border:1.5px solid var(--border)}
.eico{font-size:72px;margin-bottom:16px;display:block;animation:flt 3s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.sbtn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;text-decoration:none;padding:14px 32px;border-radius:30px;font-weight:700;font-size:15px;box-shadow:0 6px 20px rgba(124,58,237,.35)}
.toast{position:fixed;bottom:28px;right:28px;background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;padding:14px 20px;border-radius:18px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(124,58,237,.45);animation:tin .4s cubic-bezier(.34,1.56,.64,1);border-left:4px solid #fbbf24}
@keyframes tin{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">🛍️ Shop<span>Easy</span></a>
  <div class="nav-r">
    <div id="nav-user"></div>
    <a href="/cart.html" class="nav-cart">🛒 <span class="badge" id="cart-count">0</span></a>
  </div>
</nav>
<div class="wrap">
  <div class="ptitle">🛒 Your Cart</div>
  <div id="root"></div>
</div>
<script>
const EMOJIS={Electronics:'📱',Footwear:'👟',Clothing:'👕',default:'📦'};
function getCart(){return JSON.parse(localStorage.getItem('cart')||'[]')}
function saveCart(c){localStorage.setItem('cart',JSON.stringify(c));updateBadge();render()}
function updateBadge(){const el=document.getElementById('cart-count');if(el)el.textContent=getCart().reduce((s,i)=>s+i.qty,0)}
function logout(){localStorage.removeItem('token');localStorage.removeItem('userName');location.href='/'}
function renderNav(){
  const el=document.getElementById('nav-user');if(!el)return;
  const name=localStorage.getItem('userName');
  el.innerHTML=name?`<span class="upill">👤 ${name}</span><a href="/orders.html">Orders</a><a href="#" onclick="logout()">Logout</a>`:`<a href="/login.html">Login</a><a href="/register.html">Register</a>`;
}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400)},2800)}
function changeQty(i,d){const c=getCart();c[i].qty+=d;if(c[i].qty<=0)c.splice(i,1);saveCart(c)}
function remove(i){const c=getCart();c.splice(i,1);saveCart(c)}
function render(){
  const cart=getCart();const root=document.getElementById('root');
  if(!cart.length){root.innerHTML=`<div class="empty"><span class="eico">🛒</span><h3 style="font-size:22px;font-weight:700;margin-bottom:8px">Your cart is empty!</h3><p style="color:var(--muted);margin-bottom:24px">Add some amazing products first.</p><a href="/" class="sbtn">🛍️ Start Shopping</a></div>`;return}
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const ship=sub>=999?0:49;
  root.innerHTML=`<div class="layout">
    <div>${cart.map((item,i)=>`
      <div class="cart-item">
        <div class="item-img">${item.image?`<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">`:''}${EMOJIS[item.category]||EMOJIS.default}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-sub">₹${item.price.toLocaleString('en-IN')} each</div>
          <div class="item-price">₹${(item.price*item.qty).toLocaleString('en-IN')}</div>
        </div>
        <div class="item-controls">
          <div class="qctrl"><button class="qb" onclick="changeQty(${i},-1)">−</button><span class="qn">${item.qty}</span><button class="qb" onclick="changeQty(${i},1)">+</button></div>
          <button class="rm" onclick="remove(${i})">✕</button>
        </div>
      </div>`).join('')}</div>
    <div><div class="summary">
      <div class="sum-t">Order Summary</div>
      <div class="srow"><span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} items)</span><span>₹${sub.toLocaleString('en-IN')}</span></div>
      <div class="srow"><span>Delivery</span><span>${ship===0?'<span class="free">FREE 🎉</span>':'₹'+ship}</span></div>
      ${ship>0?`<div style="font-size:11px;color:var(--g);text-align:right;margin-top:-6px">Add ₹${(999-sub)} more for free delivery!</div>`:''}
      <hr class="sdiv">
      <div class="stotal"><span>Total</span><span>₹${(sub+ship).toLocaleString('en-IN')}</span></div>
      <button class="cbtn" onclick="goCheckout()">Proceed to Checkout →</button>
      <button class="clrbtn" onclick="localStorage.removeItem('cart');render();updateBadge()">🗑️ Clear Cart</button>
      <div class="trust"><div class="tb">🔒 Secure</div><div class="tb">🚚 Fast Delivery</div><div class="tb">↩️ Easy Return</div></div>
    </div></div>
  </div>`;
}
function goCheckout(){
  if(!localStorage.getItem('token')){toast('⚠️ Please login first!');setTimeout(()=>location.href='/login.html',1400);return}
  location.href='/checkout.html';
}
renderNav();updateBadge();render();
</script>
</body>
</html>
